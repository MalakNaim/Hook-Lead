services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hookleads-sqlserver
    environment:
      SA_PASSWORD: "${SA_PASSWORD:-YourPassword123!}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD:-YourPassword123!}\" -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlserver_data:
